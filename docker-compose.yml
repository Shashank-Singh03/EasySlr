# Local Postgres for development. Cross-platform (Windows/macOS/Linux) — preferred over the
# generated start-database.sh, which assumes a bash/WSL environment.
#   Start:  docker compose up -d
#   Stop:   docker compose down            (data persists in the named volume)
#   Reset:  docker compose down -v         (drops all data)
services:
  db:
    image: postgres:16
    container_name: easyslr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: easyslr
    ports:
      # Host 5433 → container 5432. 5433 avoids clashing with a host-installed Postgres on 5432.
      - "5433:5432"
    volumes:
      - easyslr-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easyslr"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The Next.js app. Build:  docker compose up -d --build
  app:
    build: .
    container_name: easyslr-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB is reached at host "db" on its INTERNAL port 5432
      # (the 5433 mapping above is only for connecting from the host machine).
      DATABASE_URL: "postgresql://postgres:password@db:5432/easyslr"
      # Local-only throwaway secret. In a real deployment inject this from a secrets manager.
      AUTH_SECRET: "local-demo-secret-not-for-production-use-0001"
      AUTH_TRUST_HOST: "true"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

volumes:
  easyslr-pgdata:
